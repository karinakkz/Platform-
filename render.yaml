services:
  - type: web
    name: platform-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # you fill this in Render dashboard — your Supabase URL
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false        # your Vercel URL once deployed
      - key: PLATFORM_API_URL
        sync: false        # this service's own Render URL
      - key: PORT
        value: 3000
